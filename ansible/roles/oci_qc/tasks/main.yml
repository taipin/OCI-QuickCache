---
- name: Install ACL package for Ubuntu
  apt:
    name: acl
    state: present
    update_cache: yes

- name: Verify {{ ociqc_group_name }} is visible via SSSD
  getent:
    database: group
    key: "{{ ociqc_group_name }}"
  register: group_check
  failed_when: group_check is failed

- name: Create local log dir {{ OCI_QC_LOG_FILE | dirname }} with SetGID/Sticky Bit
  file:
    path: "{{ OCI_QC_LOG_FILE | dirname }}"
    state: directory
    owner: root
    group: "{{ ociqc_group_name }}"
    mode: '3775'

- name: Set default ACLs to local log dir {{ OCI_QC_LOG_FILE | dirname }} for shared group writing
  ansible.posix.acl:
    path: "{{ OCI_QC_LOG_FILE | dirname }}"
    entity: "{{ ociqc_group_name }}"
    etype: group
    permissions: rwX
    default: yes
    state: present
  # This ensures every NEW file created by ANY user is rw for the whole group

- name: Create cache dir {{ OCI_QC_CACHE_DIR_LOCAL }}/{{ OCI_QC_CACHE_DIR_NAME }} with SetGID/Sticky Bit
  file:
    path: "{{ OCI_QC_CACHE_DIR_LOCAL }}/{{ OCI_QC_CACHE_DIR_NAME }}"
    state: directory
    owner: root
    group: "{{ ociqc_group_name }}"
    mode: '3775'

- name: Set default ACLs to cache dir {{ OCI_QC_CACHE_DIR_LOCAL }}/{{ OCI_QC_CACHE_DIR_NAME }} for cache sharing
  ansible.posix.acl:
    path: "{{ OCI_QC_CACHE_DIR_LOCAL }}/{{ OCI_QC_CACHE_DIR_NAME }}"
    entity: "{{ ociqc_group_name }}"
    etype: group
    permissions: rwX
    default: yes
    state: present
  when: OCI_QC_CACHE_USE_USER_SUBDIR | bool

- name: Ensure /var/log/ociqc persistence via tmpfiles.d
  copy:
    dest: /etc/tmpfiles.d/ociqc.conf
    content: "d {{ OCI_QC_LOG_FILE | dirname }} 3775 root {{ ociqc_group_name }} -"
    mode: '0644'

- name: Ensure shared directory {{ OCI_QC_SHARD_MAP_FILE | dirname }} for mapping file exists
  file:
    path: "{{ OCI_QC_SHARD_MAP_FILE | dirname }}"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Ensure log files have shared group and mode 0664
  file:
    path: "{{ item }}"
    state: touch
    owner: root
    group: "{{ ociqc_group_name }}"
    mode: '0664'
  loop:
    - "{{ OCI_QC_LOG_FILE }}"
    - "{{ OCI_QC_ERR_FILE }}"
    - "{{ OCI_QC_MAPPING_LOG }}"
    - "{{ OCI_QC_CLEANUP_LOG }}"

- name: Ensure install directory {{ OCI_QC_INSTALL_DIR }} exists
  file:
    path: "{{ OCI_QC_INSTALL_DIR }}"
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: '0755'

- name: Copy sitecustomize script
  copy:
    src: sitecustomize.py
    dest: "{{ OCI_QC_INSTALL_DIR }}/sitecustomize.py"
    owner: ubuntu
    group: ubuntu
    mode: '0755'

- name: Copy env.yaml script
  copy:
    src: env.yaml
    dest: "{{ OCI_QC_INSTALL_DIR }}/env.yaml"
    owner: ubuntu
    group: ubuntu
    mode: '0755'

- name: Copy cleanup Python script
  copy:
    src: oci_qc_cleanup.py
    dest: "{{ OCI_QC_INSTALL_DIR }}/oci_qc_cleanup.py"
    owner: ubuntu
    group: ubuntu
    mode: '0755'

- name: Deploy systemd service
  template:
    src: oci_qc_cleanup.service.j2
    dest: /etc/systemd/system/oci_qc_cleanup.service
    owner: root
    group: root
    mode: '0644'
  notify: reload systemd

- name: Copy systemd timer
  copy:
    src: oci_qc_cleanup.timer
    dest: /etc/systemd/system/oci_qc_cleanup.timer
    owner: root
    group: root
    mode: '0644'
  notify: reload systemd

- name: Deploy logrotate config
  template:
    src: oci_qc.logrotate.j2
    dest: /etc/logrotate.d/oci_qc
    owner: root
    group: root
    mode: '0644'

- name: Ensure timer is enabled and started
  systemd:
    name: oci_qc_cleanup.timer
    enabled: yes
    state: started
