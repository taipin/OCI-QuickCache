<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1700" viewBox="0 0 1400 1700">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#edf4ff"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#254d73"/>
    </marker>
    <style>
      .title { font: 700 32px 'Menlo', 'SFMono-Regular', monospace; fill: #12344f; }
      .label { font: 500 36px 'Menlo', 'SFMono-Regular', monospace; fill: #1d3f5d; }
      .small { font: 500 30px 'Menlo', 'SFMono-Regular', monospace; fill: #2b4f6f; }
      .box { fill: #ffffff; stroke: #2d5a84; stroke-width: 2.8px; rx: 14; }
      .boxSoft { fill: #f4f9ff; stroke: #2d5a84; stroke-width: 2.8px; rx: 14; }
      .boxGreen { fill: #eefcf4; stroke: #2d8a57; stroke-width: 2.8px; rx: 14; }
      .boxOrange { fill: #fff4e8; stroke: #bc6a1f; stroke-width: 2.8px; rx: 14; }
      .line { stroke: #254d73; stroke-width: 3.2px; fill: none; }
    </style>
  </defs>

  <rect x="0" y="0" width="1400" height="1700" fill="url(#bg)"/>
  <rect x="40" y="30" width="1320" height="1320" class="boxSoft"/>
  <text x="700.0" y="95" text-anchor="middle" class="title">GPU Cluster</text>

  <rect x="90" y="130" width="380" height="980" class="box"/>
  <rect x="510" y="130" width="380" height="980" class="box"/>
  <rect x="930" y="130" width="380" height="980" class="box"/>

  <text x="280" y="200" text-anchor="middle" class="title" style="font-size:30px">GPU Node 1</text>
  <text x="700" y="200" text-anchor="middle" class="title" style="font-size:30px">GPU Node 2</text>
  <text x="1120" y="200" text-anchor="middle" class="title" style="font-size:30px">GPU Node 3</text>

  <rect x="140" y="250" width="280" height="230" class="boxSoft"/>
  <rect x="560" y="250" width="280" height="230" class="boxSoft"/>
  <rect x="980" y="250" width="280" height="230" class="boxSoft"/>

  <text x="280" y="330" text-anchor="middle" class="label">Training Job</text>
  <text x="280" y="390" text-anchor="middle" class="small">(uses GPU)</text>
  <text x="700" y="330" text-anchor="middle" class="label">Training Job</text>
  <text x="700" y="390" text-anchor="middle" class="small">(uses GPU)</text>
  <text x="1120" y="330" text-anchor="middle" class="label">Training Job</text>
  <text x="1120" y="390" text-anchor="middle" class="small">(uses GPU)</text>

  <rect x="140" y="560" width="1120" height="170" class="boxGreen"/>
  <text x="700" y="625" text-anchor="middle" class="title" style="font-size:30px">Sharding</text>
  <text x="260" y="685" text-anchor="middle" class="label">FS-Mount-1</text>
  <text x="700" y="685" text-anchor="middle" class="label">FS-Mount-2</text>
  <text x="1140" y="685" text-anchor="middle" class="label">FS-Mount-3</text>

  <rect x="140" y="830" width="280" height="180" class="boxSoft"/>
  <rect x="560" y="830" width="280" height="180" class="boxSoft"/>
  <rect x="980" y="830" width="280" height="180" class="boxSoft"/>

  <text x="280" y="905" text-anchor="middle" class="label">Local NVMe</text>
  <text x="280" y="955" text-anchor="middle" class="small">(fast tier)</text>
  <text x="700" y="905" text-anchor="middle" class="label">Local NVMe</text>
  <text x="700" y="955" text-anchor="middle" class="small">(fast tier)</text>
  <text x="1120" y="905" text-anchor="middle" class="label">Local NVMe</text>
  <text x="1120" y="955" text-anchor="middle" class="small">(fast tier)</text>

  <rect x="460" y="1450" width="480" height="170" class="boxOrange"/>
  <text x="700" y="1530" text-anchor="middle" class="title" style="font-size:28px">Remote Storage</text>
  <text x="700" y="1570" text-anchor="middle" class="small">S3 Requests</text>

  <line x1="280" y1="480" x2="280" y2="560" class="line" marker-end="url(#arrow)"/>
  <line x1="700" y1="480" x2="700" y2="560" class="line" marker-end="url(#arrow)"/>
  <line x1="1120" y1="480" x2="1120" y2="560" class="line" marker-end="url(#arrow)"/>
  <text x="305" y="535" class="small">read</text>
  <text x="725" y="535" class="small">read</text>
  <text x="1145" y="535" class="small">read</text>

  <line x1="280" y1="730" x2="280" y2="830" class="line" marker-end="url(#arrow)"/>
  <line x1="700" y1="730" x2="700" y2="830" class="line" marker-end="url(#arrow)"/>
  <line x1="1120" y1="730" x2="1120" y2="830" class="line" marker-end="url(#arrow)"/>

  <line x1="280" y1="1010" x2="280" y2="1150" class="line"/>
  <line x1="700" y1="1010" x2="700" y2="1150" class="line"/>
  <line x1="1120" y1="1010" x2="1120" y2="1150" class="line"/>
  <line x1="280" y1="1150" x2="1120" y2="1150" class="line"/>
  <line x1="700" y1="1120" x2="700" y2="1450" class="line" marker-end="url(#arrow)"/>
  <text x="730" y="1220" class="label">If not found locally</text>
</svg>
